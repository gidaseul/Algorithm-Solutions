name: Daily Codetree + README Update

on:
  schedule:
    # 매일 23:50 KST (UTC 14:50)
    - cron: '50 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0   # 🔥 git log 날짜 정확히 가져오려면 필요

      # -----------------------------
      # Move stray Codetree folders
      # -----------------------------
      - name: Move stray Codetree folders
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p Codetree

          moved=0

          for dir in [0-9][0-9][0-9][0-9][0-9][0-9]; do
            [ -d "$dir" ] || continue

            if [ -e "Codetree/$dir" ]; then
              echo "Skip $dir: Codetree/$dir already exists"
              continue
            fi

            git mv "$dir" "Codetree/$dir"
            moved=1
          done

          if [ "$moved" -eq 0 ]; then
            echo "No stray Codetree folders found"
          fi

      # -----------------------------
      # Python setup
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # -----------------------------
      # Update README
      # -----------------------------
      - name: Update README statistics
        run: python scripts/update_readme.py

      # -----------------------------
      # Commit changes if needed
      # -----------------------------
      - name: Commit and push if changed
        run: |
          if ! git diff --quiet; then
            git add .
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "chore: daily auto update"
            git push
          fi
